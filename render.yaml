services:
  - type: web
    name: docusync-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MODULE_MAPPING_PATH
        value: ../config/module_mapping.json
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/docusync.db
    disk:
      name: docusync-data
      mountPath: /var/data
      sizeGB: 1
